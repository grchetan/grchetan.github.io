<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Chetan Prajapat</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #080808;
        color: #fff;
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        overflow: hidden;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
      }
      .glow {
        position: fixed;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.05) 0%,
          transparent 65%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 0;
      }
      .wrap {
        position: relative;
        z-index: 2;
        padding: 40px 20px;
      }
      .big-num {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(130px, 26vw, 240px);
        line-height: 0.9;
        background: linear-gradient(180deg, #fff 0%, #333 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 6px;
        animation: fadeDown 0.8s ease both;
      }
      .title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(22px, 4vw, 38px);
        letter-spacing: 4px;
        color: rgba(255, 255, 255, 0.7);
        margin: 10px 0 18px;
        animation: fadeUp 0.8s 0.2s ease both;
      }
      .desc {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.4);
        max-width: 360px;
        margin: 0 auto 36px;
        line-height: 1.8;
        animation: fadeUp 0.8s 0.3s ease both;
      }
      .desc strong {
        color: #fff;
      }
      .btns {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        animation: fadeUp 0.8s 0.4s ease both;
      }
      .btn-fill {
        background: #fff;
        color: #000;
        padding: 12px 26px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 1px;
        transition: all 0.2s;
      }
      .btn-fill:hover {
        background: #ddd;
        transform: translateY(-2px);
      }
      .btn-out {
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: #fff;
        padding: 12px 26px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
        transition: all 0.2s;
      }
      .btn-out:hover {
        border-color: #fff;
        transform: translateY(-2px);
      }
      .counter {
        margin-top: 36px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.25);
        animation: fadeUp 0.8s 0.5s ease both;
      }
      .counter span {
        color: rgba(255, 255, 255, 0.6);
        font-weight: 700;
      }
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="glow"></div>
    <div class="wrap">
      <div class="big-num">404</div>
      <div class="title">PAGE NOT FOUND</div>
      <p class="desc">
        This URL doesn't exist.<br /><strong>Wrong link</strong> or the page was
        removed.
      </p>
      <div class="btns">
        <a href="https://grchetan.github.io/" class="btn-fill"
          >← Back to Home</a
        >
        <a href="https://grchetan.github.io/#contact" class="btn-out"
          >Contact Me</a
        >
      </div>
      <div class="counter">
        Auto redirect in <span id="count">10</span> seconds...
      </div>
    </div>
    <script>
      let sec = 10;
      const el = document.getElementById('count');
      const t = setInterval(() => {
        sec--;
        el.textContent = sec;
        if (sec <= 0) {
          clearInterval(t);
          window.location.href = 'https://grchetan.github.io/';
        }
      }, 1000);
    </script>
  </body>
</html>
